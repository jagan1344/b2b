services:
  - type: web
    name: spms-app
    runtime: node
    plan: free # Change to starter/pro if needed
    buildCommand: npm install && npm install --prefix server && npm run build:prod
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./prisma/dev.db # Relative to server directory
      - key: PORT
        value: 10000
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://spms-app.onrender.com # Update this after first deploy
